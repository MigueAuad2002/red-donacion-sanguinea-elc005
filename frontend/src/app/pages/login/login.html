<main class="min-h-dvh bg-[#EBEBEB] flex items-center justify-center px-4 py-10">
  <div class="w-full max-w-[420px]">

    <!-- Cabecera institucional -->
    <div class="flex items-center gap-3 mb-6 pb-5 border-b border-[#D5D5D5]">
      <div class="flex-shrink-0 w-10 h-10 rounded-[6px] bg-[#9B1A1A] flex items-center justify-center">
        <svg class="w-5 h-5 fill-white" viewBox="0 0 24 24">
          <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>
        </svg>
      </div>
      <div>
        <strong class="block text-[13px] font-bold text-gray-900 leading-snug">
          Red de Emparejamiento para Donaciones de Sangre
        </strong>
        <span class="text-[11px] text-gray-400 tracking-wide uppercase">Ingenieria de la Calidad · FICCT</span>
      </div>
    </div>

    <!-- Card -->
    <div class="bg-white border border-[#DADADA] rounded-[4px] overflow-hidden">

      <!-- Header de la card -->
      <div class="bg-[#9B1A1A] px-7 py-5">
        <h2 class="text-[15px] font-bold text-white uppercase tracking-wide">Acceso al sistema</h2>
        <p class="text-[12px] text-white/60 mt-0.5">Ingresa tus credenciales institucionales para continuar</p>
      </div>

      <!-- Cuerpo -->
      <div class="px-7 py-7">

        <!-- Error -->
        <div
          *ngIf="errorMessage"
          class="flex items-start gap-2.5 mb-6 px-3.5 py-3
                 bg-[#FDF2F2] border border-[#E8BFBF] border-l-[3px] border-l-[#9B1A1A] rounded-sm"
        >
          <svg class="mt-0.5 w-4 h-4 flex-shrink-0 text-[#9B1A1A]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <p class="text-[13px] text-[#7A1A1A] leading-snug">{{ errorMessage }}</p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="space-y-[18px]">

          <!-- CI -->
          <div>
            <label for="ci" class="block text-[11px] font-bold tracking-[0.08em] text-gray-500 uppercase mb-1.5">
              Carnet de identidad
            </label>
            <div class="relative">
              <span class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-gray-300">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                  <rect x="2" y="5" width="20" height="14" rx="2"/>
                  <path d="M16 10h2M16 14h2M6 10h6M6 14h4"/>
                </svg>
              </span>
              <input
                id="ci"
                type="text"
                formControlName="ci"
                placeholder="1234567"
                autocomplete="username"
                inputmode="numeric"
                class="h-11 w-full rounded-[3px] border bg-[#FAFAFA] pl-9 pr-3
                       text-sm text-gray-900 placeholder-gray-300 outline-none transition
                       focus:border-[#9B1A1A] focus:bg-white focus:ring-[3px] focus:ring-[#9B1A1A]/8"
                [ngClass]="{
                  'border-red-300 bg-red-50/60': ci.invalid && ci.touched,
                  'border-[#CECECE]':            !(ci.invalid && ci.touched)
                }"
              />
            </div>
            <p *ngIf="ci.invalid && ci.touched" class="mt-1.5 text-[12px] text-[#9B1A1A] flex items-center gap-1">
              <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              {{ ciError }}
            </p>
          </div>

          <!-- Contraseña -->
          <div>
            <div class="flex items-center justify-between mb-1.5">
              <label for="password" class="text-[11px] font-bold tracking-[0.08em] text-gray-500 uppercase">
                Contraseña
              </label>
              <button type="button" (click)="togglePassword()"
                class="text-[11px] font-bold text-[#9B1A1A] uppercase tracking-wide hover:underline">
                {{ showPassword ? 'Ocultar' : 'Ver' }}
              </button>
            </div>
            <div class="relative">
              <span class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-gray-300">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                  <rect x="3" y="11" width="18" height="11" rx="2"/>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
              </span>
              <input
                id="password"
                [type]="showPassword ? 'text' : 'password'"
                formControlName="password"
                placeholder="Ingresa tu contraseña"
                autocomplete="current-password"
                class="h-11 w-full rounded-[3px] border bg-[#FAFAFA] pl-9 pr-3
                       text-sm text-gray-900 placeholder-gray-300 outline-none transition
                       focus:border-[#9B1A1A] focus:bg-white focus:ring-[3px] focus:ring-[#9B1A1A]/8"
                [ngClass]="{
                  'border-red-300 bg-red-50/60': password.invalid && password.touched,
                  'border-[#CECECE]':             !(password.invalid && password.touched)
                }"
              />
            </div>
            <p *ngIf="password.invalid && password.touched" class="mt-1.5 text-[12px] text-[#9B1A1A] flex items-center gap-1">
              <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              {{ passwordError }}
            </p>
          </div>

          <div class="h-px bg-[#EBEBEB] !mt-6"></div>

          <!-- Submit -->
          <button
            type="submit"
            [disabled]="loginForm.invalid || isLoading"
            class="flex h-11 w-full items-center justify-center gap-2 rounded-[3px]
                   bg-[#9B1A1A] text-[13px] font-bold text-white uppercase tracking-wider
                   transition hover:bg-[#7A1515] active:scale-[0.99]
                   disabled:cursor-not-allowed disabled:bg-[#C9A0A0]"
          >
            <ng-container *ngIf="!isLoading">Ingresar al sistema</ng-container>
            <ng-container *ngIf="isLoading">
              <span class="h-4 w-4 animate-spin rounded-full border-2 border-white/30 border-t-white"></span>
              Verificando…
            </ng-container>
          </button>

        </form>
      </div>

      <!-- Footer de la card -->
      <div class="flex items-center justify-between px-7 py-4 bg-[#FAFAFA] border-t border-[#EBEBEB]">
        <span class="text-[12px] text-gray-400">¿Sin cuenta aún?</span>
        <a routerLink="/register" class="text-[12px] font-bold text-[#9B1A1A] hover:underline tracking-wide">
          Solicitar acceso →
        </a>
      </div>

    </div>

    <p class="text-center mt-4 text-[11px] text-gray-400 tracking-wide">
      Proyecto académico · Ingeniería de la Calidad
    </p>

  </div>
</main>
