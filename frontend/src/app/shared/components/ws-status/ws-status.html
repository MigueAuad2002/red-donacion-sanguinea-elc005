<div
  class="fixed bottom-4 right-4 z-[9999] flex flex-col items-end sm:bottom-5 sm:right-5"
>

  <div
    (click)="$event.stopPropagation()"
    class="mb-3 w-[min(calc(100vw-2rem),280px)] origin-bottom-right overflow-hidden rounded-[8px] border border-[#DADADA] bg-white shadow-xl shadow-black/10 transition-all duration-200 ease-out"
    [ngClass]="menuAbierto
      ? 'pointer-events-auto translate-y-0 scale-100 opacity-100'
      : 'pointer-events-none translate-y-3 scale-95 opacity-0'"
  >

    <div class="border-b border-[#EBEBEB] px-4 py-3">
      <div class="flex items-center justify-between gap-3">
        <div>
          <h3 class="text-[12px] font-bold uppercase tracking-wide text-gray-900">
            Centro de alertas
          </h3>
          <p class="mt-0.5 text-[11px] leading-4 text-gray-400">
            Notificaciones y conexión en vivo.
          </p>
        </div>

        <span
          class="h-2.5 w-2.5 rounded-full"
          [ngClass]="claseEstadoDot"
        ></span>
      </div>
    </div>

    <div class="p-2">

      <button
        type="button"
        (click)="abrirNotificaciones($event)"
        class="flex w-full items-center gap-3 rounded-[6px] px-3 py-3 text-left transition hover:bg-[#FDF2F2]"
      >
        <div class="flex h-9 w-9 flex-shrink-0 items-center justify-center rounded-full bg-[#FDF2F2] text-[#9B1A1A]">
          <svg class="h-4 w-4" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 22a2.5 2.5 0 0 0 2.45-2h-4.9A2.5 2.5 0 0 0 12 22Zm7-6V11a7 7 0 1 0-14 0v5l-2 2v1h18v-1l-2-2Z"/>
          </svg>
        </div>

        <div class="min-w-0">
          <p class="text-[13px] font-bold text-gray-900">
            Ir a notificaciones
          </p>
          <p class="mt-0.5 text-[11px] leading-4 text-gray-400">
            Ver historial de alertas recibidas.
          </p>
        </div>
      </button>

      <div class="mt-1 rounded-[6px] border border-[#EBEBEB] bg-[#FAFAFA] px-3 py-3">

        <div class="flex items-start gap-3">
          <span
            class="mt-1 h-2.5 w-2.5 flex-shrink-0 rounded-full"
            [ngClass]="claseEstadoDot"
          ></span>

          <div class="min-w-0 flex-1">
            <p class="text-[12px] font-bold uppercase tracking-wide text-gray-900">
              {{ textoEstado }}
            </p>
            <p class="mt-0.5 text-[11px] leading-4 text-gray-500">
              {{ descripcionEstado }}
            </p>
          </div>
        </div>

        <button
          *ngIf="estaEnError"
          type="button"
          (click)="reintentarConexion($event)"
          class="mt-3 h-8 w-full rounded-[3px] border border-[#CECECE] bg-white px-3 text-[11px] font-bold uppercase tracking-wide text-gray-700 transition hover:border-[#9B1A1A] hover:text-[#9B1A1A]"
        >
          Reintentar conexión
        </button>

      </div>

    </div>

  </div>

  <button
    type="button"
    (click)="toggleMenu($event)"
    class="relative flex h-12 w-12 flex-shrink-0 items-center justify-center rounded-full border border-[#E8BFBF] bg-white text-[#9B1A1A] shadow-md shadow-black/10 transition-all duration-200 ease-out hover:-translate-y-0.5 hover:border-[#9B1A1A] hover:shadow-lg active:translate-y-0 active:scale-95 sm:h-12 sm:w-12"
    [ngClass]="menuAbierto ? 'rotate-[-8deg] scale-[1.03]' : 'rotate-0 scale-100'"
    aria-label="Abrir centro de alertas"
  >

    <svg
      class="h-5 w-5 transition-transform duration-200 ease-out"
      [ngClass]="menuAbierto ? 'rotate-[12deg]' : 'rotate-0'"
      viewBox="0 0 24 24"
      fill="currentColor"
    >
      <path d="M12 22a2.5 2.5 0 0 0 2.45-2h-4.9A2.5 2.5 0 0 0 12 22Zm7-6V11a7 7 0 1 0-14 0v5l-2 2v1h18v-1l-2-2Z"/>
    </svg>

    <span
      class="absolute right-1.5 top-1.5 h-2.5 w-2.5 rounded-full border-2 border-white"
      [ngClass]="claseEstadoDot"
    ></span>

    <span
      *ngIf="tieneNuevaNotificacion"
      class="absolute -right-0.5 -top-0.5 h-2.5 w-2.5 rounded-full bg-[#9B1A1A]"
    ></span>

  </button>

</div>
