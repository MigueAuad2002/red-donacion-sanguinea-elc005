<div class="overflow-hidden rounded-[4px] border border-[#DADADA] bg-white">

  <div class="flex flex-col gap-3 border-b border-[#EBEBEB] px-4 py-3 sm:flex-row sm:items-center sm:justify-between">

    <div>
      <h3 class="text-[13px] font-bold uppercase tracking-wide text-gray-900">
        {{ titulo }}
      </h3>
      <p class="mt-0.5 text-[12px] leading-5 text-gray-400">
        {{ descripcion }}
      </p>
    </div>

    <div class="flex flex-wrap gap-2">

      <button
        *ngIf="modoSeleccion"
        type="button"
        (click)="usarMiUbicacion()"
        class="h-9 rounded-[3px] border border-[#CECECE] bg-white px-3 text-[11px] font-bold uppercase tracking-wide text-gray-700 transition hover:border-[#9B1A1A] hover:text-[#9B1A1A]"
      >
        Mi ubicación
      </button>

      <span
        class="flex h-9 items-center rounded-[3px] border px-3 text-[11px] font-bold uppercase tracking-wide"
        [ngClass]="tieneCoordenadas ? 'border-green-200 bg-green-50 text-green-700' : 'border-amber-200 bg-amber-50 text-amber-700'"
      >
        {{ tieneCoordenadas ? 'Coordenadas listas' : 'Sin coordenadas' }}
      </span>

    </div>

  </div>

  <div class="bg-[#FAFAFA] p-3 sm:p-4">

    <div
      #mapContainer
      class="w-full overflow-hidden rounded-[4px] border border-[#CECECE] bg-[#EBEBEB]"
      [style.height]="altura"
    ></div>

    <div class="mt-3 flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">

      <p class="text-[12px] leading-5 text-gray-500">
        <span class="font-bold text-gray-700">Coordenadas:</span>
        {{ coordenadasTexto }}
      </p>

      <p *ngIf="modoSeleccion" class="text-[11px] uppercase tracking-wide text-gray-400">
        Click en el mapa o arrastra el marcador
      </p>

    </div>

  </div>

</div>
